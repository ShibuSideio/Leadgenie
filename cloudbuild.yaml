steps:
# Enterprise Immutable Firebase Pipeline
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:node'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    npm install -g firebase-tools
    firebase deploy --project lead-sniper-prod --only hosting,firestore --non-interactive --debug

options:
  logging: CLOUD_LOGGING_ONLY
