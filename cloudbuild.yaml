steps:
# Install and Execute Firebase Tools in a Single Step (Shared Container State)
- name: 'node:20'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "$$FIREBASE_SA_KEY" > /workspace/sa-key.json
    export GOOGLE_APPLICATION_CREDENTIALS="/workspace/sa-key.json"
    npm install -g firebase-tools
    firebase deploy --only hosting:main,firestore --project lead-sniper-prod-691c1 --non-interactive --debug
  secretEnv: ['FIREBASE_SA_KEY']

availableSecrets:
  secretManager:
  - versionName: projects/lead-sniper-prod-691c1/secrets/FIREBASE_SA_KEY/versions/latest
    env: 'FIREBASE_SA_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
