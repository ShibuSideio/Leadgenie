steps:
# Install and Execute Firebase Tools in a Single Step (Shared Container State)
- name: 'node:20'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    npm install -g firebase-tools
    firebase deploy --only hosting:main,firestore --project lead-sniper-prod --non-interactive --debug

options:
  logging: CLOUD_LOGGING_ONLY
