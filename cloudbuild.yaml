steps:
# Enterprise Immutable Firebase Pipeline
- name: 'node:20'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    # 1. Dynamically write Identity Payload to an ephemeral memory layer
    echo "$$FIREBASE_SA_KEY" > /workspace/secure-key.json
    
    # 2. Instruct Firebase CLI to use Enterprise Application Default Credentials
    export GOOGLE_APPLICATION_CREDENTIALS="/workspace/secure-key.json"
    
    # 3. Securely deploy all targeted architecture arrays
    npm install -g firebase-tools
    firebase deploy --only hosting:main,firestore --project lead-sniper-prod --non-interactive --debug
  
  # Inject the memory variable exclusively into this container's runtime
  secretEnv: ['FIREBASE_SA_KEY']

# Strict Sub-Service Native Mappings
options:
  logging: CLOUD_LOGGING_ONLY

# Bind Google Secret Manager directly to the Identity Block
availableSecrets:
  secretManager:
  - versionName: projects/lead-sniper-prod/secrets/FIREBASE_SA_KEY/versions/latest
    env: 'FIREBASE_SA_KEY'
