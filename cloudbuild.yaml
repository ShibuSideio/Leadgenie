steps:
# ---------------------------------------------------------------------
# Microservice 1: Orchestrator
# ---------------------------------------------------------------------
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/lead-orchestrator', './services/orchestrator']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/lead-orchestrator']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: ['run', 'deploy', 'orchestrator', '--image', 'gcr.io/$PROJECT_ID/lead-orchestrator', '--region', 'asia-south1', '--memory', '256Mi', '--no-allow-unauthenticated', '--set-env-vars=PROJECT_ID=$PROJECT_ID,QUEUE=lead-pipeline-queue,LOCATION=asia-south1,PIPELINE_URL=https://lead-pipeline-main-222247989819.asia-south1.run.app/dispatch']

# ---------------------------------------------------------------------
# Microservice 2: Pipeline Main
# ---------------------------------------------------------------------
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/lead-pipeline-main', './services/pipeline-main']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/lead-pipeline-main']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: ['run', 'deploy', 'lead-pipeline-main', '--image', 'gcr.io/$PROJECT_ID/lead-pipeline-main', '--region', 'asia-south1', '--memory', '512Mi', '--no-allow-unauthenticated', '--service-account', 'lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com']

# Removed fragile bash orchestrator build module
# Microservice 3: Scraper Heavy (Playwright)
# ---------------------------------------------------------------------
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/scraper-heavy', './services/scraper-heavy']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/scraper-heavy']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: ['run', 'deploy', 'scraper-heavy', '--image', 'gcr.io/$PROJECT_ID/scraper-heavy', '--region', 'asia-south1', '--memory', '2Gi', '--min-instances', '0', '--no-allow-unauthenticated', '--service-account', 'scraper-heavy-sa@$PROJECT_ID.iam.gserviceaccount.com']

# ---------------------------------------------------------------------
# Microservice 4: WhatsApp Webhook
# ---------------------------------------------------------------------
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/whatsapp-webhook', './services/whatsapp-webhook']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/whatsapp-webhook']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: ['run', 'deploy', 'whatsapp-webhook', '--image', 'gcr.io/$PROJECT_ID/whatsapp-webhook', '--region', 'asia-south1', '--memory', '128Mi', '--allow-unauthenticated', '--service-account', 'whatsapp-webhook-sa@$PROJECT_ID.iam.gserviceaccount.com']

# ---------------------------------------------------------------------
# Microservice 5: Email Summary
# ---------------------------------------------------------------------
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/email-summary', './services/email-summary']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/email-summary']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: ['run', 'deploy', 'email-summary', '--image', 'gcr.io/$PROJECT_ID/email-summary', '--region', 'asia-south1', '--memory', '128Mi', '--no-allow-unauthenticated', '--service-account', 'email-summary-sa@$PROJECT_ID.iam.gserviceaccount.com']

# ---------------------------------------------------------------------
# Firebase Frontend Deployment
# ---------------------------------------------------------------------
- name: 'node:20'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "$$FIREBASE_SA_KEY" > /workspace/secure-key.json
    export GOOGLE_APPLICATION_CREDENTIALS="/workspace/secure-key.json"
    npm install -g firebase-tools
    firebase deploy --project lead-sniper-prod --only hosting,firestore --non-interactive --debug
  secretEnv: ['FIREBASE_SA_KEY']

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
  - versionName: projects/lead-sniper-prod/secrets/FIREBASE_SA_KEY/versions/latest
    env: 'FIREBASE_SA_KEY'
