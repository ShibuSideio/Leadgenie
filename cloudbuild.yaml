# =============================================================================
# PHASE 3b: DEPLOY — Digital Twin Engine
# 512Mi RAM, --no-allow-unauthenticated (Firebase ID token required).
# Low concurrency (4) — each request runs a parallel Serper + Gemini call;
# memory is the binding constraint, not CPU.
# =============================================================================

- id: 'deploy-digital-twin-engine'
  waitFor: ['push-digital-twin-engine']
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - digital-twin-engine
  - --image=gcr.io/$PROJECT_ID/digital-twin-engine:$COMMIT_SHA
  - --region=asia-south1
  - --platform=managed
  - --memory=512Mi
  - --cpu=1
  - --min-instances=0
  - --max-instances=5
  - --concurrency=4
  # V23.4: Raised from 30s to 60s.
  # WAF detection returns fast (~7s), but Gemini 2.5 Flash can take 12-15s
  # on cold invocations. 30s was a hard ceiling hit by enterprise domains.
  - --timeout=60
  - --no-allow-unauthenticated
  - --service-account=lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com
  - --update-env-vars=PROJECT_ID=$PROJECT_ID,LOCATION=asia-south1
  - --quiet

# =============================================================================
# PHASE 4: CLOUD RUN JOB — V16 Autonomous Engine
# Jobs use --set-env-vars (acceptable: no console-managed secrets on jobs).
# --task-timeout REQUIRES the 's' duration suffix (API rejects bare integer).
# --max-retries=0: fail fast — a bad data batch should not be retried,
#   it will be caught in the next nightly sweep.
# Idempotent: describe → update if exists, create if not.
# =============================================================================

- id: 'deploy-autonomous-engine-job'
  waitFor: ['push-autonomous-engine']
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  entrypoint: bash
  args:
  - '-eo'
  - 'pipefail'
  - '-c'
  - |
    set -eo pipefail
    echo "[JOB] Deploying autonomous-engine Cloud Run Job: $COMMIT_SHA"

    if gcloud run jobs describe autonomous-engine \
        --region=asia-south1 \
        --project=$PROJECT_ID \
        --quiet 2>/dev/null; then
      echo "[JOB] Job exists — updating..."
      gcloud run jobs update autonomous-engine \
        --image=gcr.io/$PROJECT_ID/autonomous-engine:$COMMIT_SHA \
        --region=asia-south1 \
        --memory=512Mi \
        --cpu=1 \
        --task-timeout=3600s \
        --max-retries=0 \
        --service-account=lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com \
        --set-env-vars="PROJECT_ID=$PROJECT_ID,MOCK_MODE=false,DISCOVERY_ALLOCATION=0.15" \
        --quiet
    else
      echo "[JOB] Job not found — creating..."
      gcloud run jobs create autonomous-engine \
        --image=gcr.io/$PROJECT_ID/autonomous-engine:$COMMIT_SHA \
        --region=asia-south1 \
        --memory=512Mi \
        --cpu=1 \
        --task-timeout=3600s \
        --max-retries=0 \
        --service-account=lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com \
        --set-env-vars="PROJECT_ID=$PROJECT_ID,MOCK_MODE=false,DISCOVERY_ALLOCATION=0.15" \
        --quiet
    fi
    echo "[JOB] autonomous-engine deployed successfully."

# V18: Shadow Learner Aggregator — Cloud Run Job deploy
# Depends only on its push. Runs in parallel with other Phase 4 deploys.
# Uses shadow-learner-sa (BQ dataEditor + Firestore datastore.user).
# WINDOW_HOURS=12 matches the Cloud Scheduler 12h trigger cadence.
- id: 'deploy-shadow-learner-job'
  waitFor: ['push-shadow-learner']
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  entrypoint: bash
  args:
  - '-eo'
  - 'pipefail'
  - '-c'
  - |
    set -eo pipefail
    echo "[JOB] Deploying shadow-learner-aggregator Cloud Run Job: $COMMIT_SHA"

    # Uses lead-pipeline-sa as the Cloud Run Job identity.
    # To switch to shadow-learner-sa (BQ DataEditor + Firestore access), first
    # grant the one-time IAM binding in YOUR OWN terminal (requires iam.admin):
    #
    #   gcloud iam service-accounts add-iam-policy-binding \
    #     shadow-learner-sa@lead-sniper-prod.iam.gserviceaccount.com \
    #     --member="serviceAccount:222247989819-compute@developer.gserviceaccount.com" \
    #     --role="roles/iam.serviceAccountUser" \
    #     --project=lead-sniper-prod
    #
    # After granting, replace "lead-pipeline-sa" below with "shadow-learner-sa".
    JOB_SA="lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com"
    echo "[JOB] Using service account: $$JOB_SA"

    if gcloud run jobs describe shadow-learner-aggregator \
        --region=asia-south1 \
        --project=$PROJECT_ID \
        --quiet 2>/dev/null; then
      echo "[JOB] Job exists — updating..."
      gcloud run jobs update shadow-learner-aggregator \
        --image=gcr.io/$PROJECT_ID/shadow-learner-aggregator:$COMMIT_SHA \
        --region=asia-south1 \
        --memory=512Mi \
        --cpu=1 \
        --task-timeout=3600s \
        --max-retries=1 \
        --service-account="$$JOB_SA" \
        --set-env-vars="PROJECT_ID=$PROJECT_ID,BQ_DATASET=swarm_analytics,BQ_TABLE=rlhf_events,WINDOW_HOURS=12" \
        --quiet
    else
      echo "[JOB] Job not found — creating..."
      gcloud run jobs create shadow-learner-aggregator \
        --image=gcr.io/$PROJECT_ID/shadow-learner-aggregator:$COMMIT_SHA \
        --region=asia-south1 \
        --memory=512Mi \
        --cpu=1 \
        --task-timeout=3600s \
        --max-retries=1 \
        --service-account="$$JOB_SA" \
        --set-env-vars="PROJECT_ID=$PROJECT_ID,BQ_DATASET=swarm_analytics,BQ_TABLE=rlhf_events,WINDOW_HOURS=12" \
        --quiet
    fi
    echo "[JOB] shadow-learner-aggregator deployed successfully."

# =============================================================================
# PHASE 5: CLOUD SCHEDULER PROVISIONING

# Depends on: orchestrator deploy (URL fetched dynamically post-deploy).
# ALL bash variables use $$ (Cloud Build escape → bash sees $).
# $PROJECT_ID and $COMMIT_SHA are Cloud Build substitutions (single $).
# set -eo pipefail: any scheduler failure fails the build — silent breakage
#   of cron jobs is a production incident waiting to happen.
# Idempotent: describe → update if exists, create if not.
# =============================================================================

- id: 'provision-cloud-scheduler'
  waitFor: ['deploy-orchestrator', 'deploy-autonomous-engine-job']
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  entrypoint: bash
  args:
  - '-eo'
  - 'pipefail'
  - '-c'
  - |
    set -eo pipefail

    # Fetch live orchestrator URL — stable per service, safe to query post-deploy
    ORCH_URL=$(gcloud run services describe orchestrator \
      --region=asia-south1 \
      --project=$PROJECT_ID \
      --format='value(status.url)')

    if [ -z "$$ORCH_URL" ]; then
      echo "ERROR: Orchestrator URL is empty. Scheduler provisioning aborted."
      exit 1
    fi

    echo "[SCHEDULER] Orchestrator endpoint: $$ORCH_URL"
    SA="lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com"

    # ------------------------------------------------------------------
    # Job 1: Pipeline Sweep — every 5 minutes (Cartographer heartbeat)
    # ------------------------------------------------------------------
    if gcloud scheduler jobs describe pipeline-sweep \
        --location=asia-south1 --project=$PROJECT_ID --quiet 2>/dev/null; then
      gcloud scheduler jobs update http pipeline-sweep \
        --location=asia-south1 \
        --schedule='*/5 * * * *' \
        --uri="$$ORCH_URL/api/internal/cron/sweep" \
        --message-body='{}' \
        --http-method=POST \
        --oidc-service-account-email=$$SA \
        --oidc-token-audience=$$ORCH_URL \
        --quiet
    else
      gcloud scheduler jobs create http pipeline-sweep \
        --location=asia-south1 \
        --schedule='*/5 * * * *' \
        --uri="$$ORCH_URL/api/internal/cron/sweep" \
        --message-body='{}' \
        --http-method=POST \
        --oidc-service-account-email=$$SA \
        --oidc-token-audience=$$ORCH_URL \
        --quiet
    fi
    echo "[SCHEDULER] pipeline-sweep OK"

    # ------------------------------------------------------------------
    # Job 2: AI Reflection Loop — weekly Sunday 02:00 UTC
    # ------------------------------------------------------------------
    if gcloud scheduler jobs describe ai-reflection \
        --location=asia-south1 --project=$PROJECT_ID --quiet 2>/dev/null; then
      gcloud scheduler jobs update http ai-reflection \
        --location=asia-south1 \
        --schedule='0 2 * * 0' \
        --uri="$$ORCH_URL/api/internal/cron/reflection" \
        --message-body='{}' \
        --http-method=POST \
        --oidc-service-account-email=$$SA \
        --oidc-token-audience=$$ORCH_URL \
        --quiet
    else
      gcloud scheduler jobs create http ai-reflection \
        --location=asia-south1 \
        --schedule='0 2 * * 0' \
        --uri="$$ORCH_URL/api/internal/cron/reflection" \
        --message-body='{}' \
        --http-method=POST \
        --oidc-service-account-email=$$SA \
        --oidc-token-audience=$$ORCH_URL \
        --quiet
    fi
    echo "[SCHEDULER] ai-reflection OK"

    # ------------------------------------------------------------------
    # Job 3: Ontology Decay — 1st of every month at 00:00 UTC
    # ------------------------------------------------------------------
    if gcloud scheduler jobs describe ontology-decay \
        --location=asia-south1 --project=$PROJECT_ID --quiet 2>/dev/null; then
      gcloud scheduler jobs update http ontology-decay \
        --location=asia-south1 \
        --schedule='0 0 1 * *' \
        --uri="$$ORCH_URL/api/internal/cron/ontology-decay" \
        --message-body='{}' \
        --http-method=POST \
        --oidc-service-account-email=$$SA \
        --oidc-token-audience=$$ORCH_URL \
        --quiet
    else
      gcloud scheduler jobs create http ontology-decay \
        --location=asia-south1 \
        --schedule='0 0 1 * *' \
        --uri="$$ORCH_URL/api/internal/cron/ontology-decay" \
        --message-body='{}' \
        --http-method=POST \
        --oidc-service-account-email=$$SA \
        --oidc-token-audience=$$ORCH_URL \
        --quiet
    fi
    echo "[SCHEDULER] ontology-decay OK"

    # ------------------------------------------------------------------
    # Job 4: Inbound Sentiment Radar — every 6 hours at :30 offset
    # V24.0: Triggers /api/internal/inbound-sentiment-run on orchestrator
    # Scans for tenants with inbound_radar.enabled=true and runs
    # InboundSentimentService per active campaign.
    # ------------------------------------------------------------------
    if gcloud scheduler jobs describe inbound-sentiment-radar \
        --location=asia-south1 --project=$PROJECT_ID --quiet 2>/dev/null; then
      gcloud scheduler jobs update http inbound-sentiment-radar \
        --location=asia-south1 \
        --schedule='30 */6 * * *' \
        --uri="$$ORCH_URL/api/internal/inbound-sentiment-run" \
        --message-body='{}' \
        --http-method=POST \
        --oidc-service-account-email=$$SA \
        --oidc-token-audience=$$ORCH_URL \
        --quiet
    else
      gcloud scheduler jobs create http inbound-sentiment-radar \
        --location=asia-south1 \
        --schedule='30 */6 * * *' \
        --uri="$$ORCH_URL/api/internal/inbound-sentiment-run" \
        --message-body='{}' \
        --http-method=POST \
        --oidc-service-account-email=$$SA \
        --oidc-token-audience=$$ORCH_URL \
        --quiet
    fi
    echo "[SCHEDULER] inbound-sentiment-radar OK"

    echo "[SCHEDULER] All 4 V24 Cloud Scheduler jobs provisioned. Build: $COMMIT_SHA"
    echo "[SCHEDULER] Zombie jobs purged from pipeline: autonomous-engine-trigger"

# =============================================================================
# PHASE 6: FIREBASE DEPLOY (hosting + firestore rules/indexes)
# Starts immediately in parallel with all phases — no Cloud Run dependency.
# Uses pre-built firebase-tools image to avoid 3-min npm install on each build.
# secure-key.json explicitly deleted after deploy (security hygiene).
# =============================================================================

- id: 'firebase-deploy'
  waitFor: ['gate-passed']
  name: 'node:20-slim'
  entrypoint: bash
  args:
  - '-eo'
  - 'pipefail'
  - '-c'
  - |
    set -eo pipefail
    echo "[FIREBASE] Installing firebase-tools..."
    npm install -g firebase-tools --prefer-offline --no-audit --no-fund --silent
    echo "[FIREBASE] Deploying hosting + Firestore rules/indexes..."
    echo "$$FIREBASE_SA_KEY" > /workspace/firebase-sa.json
    GOOGLE_APPLICATION_CREDENTIALS=/workspace/firebase-sa.json \
    firebase deploy \
      --project lead-sniper-prod \
      --only hosting,firestore \
      --non-interactive \
      --force
    rm -f /workspace/firebase-sa.json
    echo "[FIREBASE] Deploy complete. Build: $COMMIT_SHA"
  secretEnv: ['FIREBASE_SA_KEY']

# =============================================================================
# BUILD OPTIONS
# machineType E2_HIGHCPU_8: 8 vCPUs per worker — critical for parallel Docker
# builds to actually be fast. Default N1 (2 vCPU) bottlenecks Playwright build.
# =============================================================================
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

availableSecrets:
  secretManager:
  - versionName: projects/lead-sniper-prod/secrets/FIREBASE_SA_KEY/versions/latest
    env: 'FIREBASE_SA_KEY'
  - versionName: projects/lead-sniper-prod/secrets/INTERNAL_CRON_SECRET/versions/latest
    env: 'INTERNAL_CRON_SECRET'
