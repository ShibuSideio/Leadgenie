# =============================================================================
# PHASE 3: DEPLOY CLOUD RUN SERVICES

# CRITICAL: --update-env-vars (NOT --set-env-vars) preserves any console-set
# env vars (ENCRYPTION_KEY, etc.) that are not managed in this pipeline.
# --platform=managed prevents interactive gcloud prompts that hang CI.
# =============================================================================

- id: 'deploy-orchestrator'
  waitFor: ['push-orchestrator']
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  entrypoint: bash
  args:
  - '-c'
  - |
    gcloud run deploy orchestrator \
      --image=gcr.io/$PROJECT_ID/lead-orchestrator:$COMMIT_SHA \
      --region=asia-south1 \
      --platform=managed \
      --memory=512Mi \
      --cpu=1 \
      --min-instances=0 \
      --max-instances=10 \
      --concurrency=80 \
      --timeout=300 \
      --no-allow-unauthenticated \
      --service-account=lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com \
      --update-env-vars=PROJECT_ID=$PROJECT_ID,QUEUE=lead-pipeline-queue,LOCATION=asia-south1,VELOCITY_THRESHOLD=10,PIPELINE_URL=https://lead-pipeline-main-222247989819.asia-south1.run.app/dispatch,ORCHESTRATOR_URL=$_ORCHESTRATOR_URL,ORCHESTRATOR_SA_EMAIL=lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com,SCHEDULER_SA_EMAIL=lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com,INTERNAL_CRON_SECRET=$$INTERNAL_CRON_SECRET \
      --quiet
  secretEnv: ['INTERNAL_CRON_SECRET']



# =============================================================================
# CRITICAL: Cloud Tasks IAM — ONE-TIME MANUAL GRANT REQUIRED
#
# Cloud Tasks sends OIDC tokens signed as lead-pipeline-sa to /produce and
# /dispatch. Cloud Run rejects these with HTTP 401 unless lead-pipeline-sa
# has roles/run.invoker on the lead-pipeline-main service.
#
# Cloud Build SA lacks resourcemanager.projects.setIamPolicy so this cannot
# be automated here. Run ONCE from a terminal with Owner/IAM Admin rights:
#
#   gcloud run services add-iam-policy-binding lead-pipeline-main \
#     --region=asia-south1 \
#     --member="serviceAccount:lead-pipeline-sa@lead-sniper-prod.iam.gserviceaccount.com" \
#     --role="roles/run.invoker" \
#     --project=lead-sniper-prod
#
# Symptom if missing: Cloud Tasks queue shows tasks with HTTP 401 retrying
# indefinitely. No Serper execution. Campaigns stall despite sweep running.
# =============================================================================
- id: 'deploy-pipeline-main'
  waitFor: ['push-pipeline-main']
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - lead-pipeline-main
  - --image=gcr.io/$PROJECT_ID/lead-pipeline-main:$COMMIT_SHA
  - --region=asia-south1
  - --platform=managed
  - --memory=512Mi
  - --cpu=1
  - --min-instances=0
  - --max-instances=5
  - --concurrency=4
  - --timeout=540
  - --no-allow-unauthenticated
  - --service-account=lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com
  # V23.4: ORCHESTRATOR_URL added to CI/CD inject (previously console-only).
  # Enables serper_service.py telemetry push on every fresh deploy.
  # V27.0.2: V27_INTELLIGENCE_ORCHESTRATOR + VERTEX_AI_PROJECT must be in CI so
  # console-only env is not required for IntentDomainOrchestrator / Gemini.
  # --update-env-vars preserves other console secrets (ENCRYPTION_KEY, SERPER, etc.).
  - --update-env-vars=PROJECT_ID=$PROJECT_ID,GCP_PROJECT=$PROJECT_ID,LOCATION=asia-south1,VERTEX_AI_PROJECT=lead-sniper-prod,VERTEX_AI_LOCATION=asia-south1,V27_INTELLIGENCE_ORCHESTRATOR=true,CB_WINDOW_MINUTES=15,PIPELINE_SA_EMAIL=lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com,ORCHESTRATOR_SA_EMAIL=lead-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com,PIPELINE_MAIN_URL=https://lead-pipeline-main-222247989819.asia-south1.run.app,ORCHESTRATOR_URL=$_ORCHESTRATOR_URL,VERSION=$COMMIT_SHA
  - --quiet



