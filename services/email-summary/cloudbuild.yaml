steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/email-summary', './services/email-summary']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/email-summary']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'email-summary'
  - '--image'
  - 'gcr.io/$PROJECT_ID/email-summary'
  - '--region'
  - 'asia-south1'
  - '--memory'
  - '128Mi'
