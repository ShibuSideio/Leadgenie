# =============================================================================
# cloudbuild.yaml — LeadGenie (Sideio) V27.0.2 Enterprise Build Pipeline
# Last reviewed: 2026-07-18 | V27.0.2 — Intent orchestrator packaging + Vertex project
#
# V27.0.2 pipeline-main deploy env (required for production correctness):
#   V27_INTELLIGENCE_ORCHESTRATOR=true   — IntentDomainOrchestrator (shared.intent_orchestrator)
#   VERTEX_AI_PROJECT=lead-sniper-prod   — Gemini host (never trendpulse-app-2025)
#   VERTEX_AI_LOCATION=asia-south1
# Docker image includes: services/shared → ./shared, services/intelligence → ./intelligence
#
# Changes from V23.5.2 (2026-04-30):
#
#   V23.5.0 (2026-06-13) — Inbound Sentiment Radar:
#   + NEW: services/orchestrator/services/inbound_sentiment_service.py
#     InboundSentimentService class — 7-mode round-robin Google Search
#     (via Serper) + Gemini Flash intent scoring. Zero platform OAuth.
#     SIGNAL_MODES: active_intent, pain_expression, competitor_churn,
#     hiring_signals, review_signals, trend_signals, community_signals.
#     GLOBAL_NEGATIVE strips ad copy. sha256 dedup on URL.
#     Gemini discard threshold: intent_score < 0.30.
#     RLHF BQ update gated on intent_score >= 0.70.
#
#   + NEW: services/orchestrator/jobs/inbound_sentiment_job.py
#     run() iterates all active tenants, calls InboundSentimentService,
#     writes inbound_signals docs to Firestore, updates BigQuery RLHF.
#
#   + NEW API ROUTES:
#     POST /api/internal/inbound-sentiment-run  — CRON trigger (internal.py)
#     GET  /api/inbound-signals                 — list signals (leads.py)
#     PUT  /api/inbound-signals/<id>/status     — promote to lead (leads.py)
#     GET  /api/me → inbound_radar stats block  — 4-key summary (me.py)
#     PUT  /api/me → inbound_radar_enabled      — on/off toggle (me.py)
#
#   + FRONTEND:
#     public/app.js  — radar banner, signals panel, 4 JS functions
#     public/index.html — #inbound-radar-banner, #inbound-signals-panel
#
#   + INFRA:
#     firestore.indexes.json — 2 composite indexes on inbound_signals
#     ARCHITECTURE_V23_COMPREHENSIVE.md — full intern-level architecture doc
#     firestore_ttl_setup.md — TTL field setup guide
#
#   + TESTS:
#     test_v23_5_inbound_radar.py — 57 new functional tests (Phase 10-14)
#     Combined test suite: 69 (V23.4) + 57 (V23.5) = 126 tests total.
#
# NOTE: No new pip dependencies. No Cloud Build structural changes.
#       No new Cloud Run services. No scheduler changes.
# =============================================================================

# Architecture:
#   Phase 0a: Frontend JS syntax gate
#   Phase 0b: Python V23 smoke test gate (blocks build on any failure)
#   Phase 1:  All 8 Docker images built IN PARALLEL (waitFor: ['gate-passed'])
#   Phase 2:  All 8 images pushed IN PARALLEL (waitFor: respective build id)
#   Phase 3:  Cloud Run Services deployed (parallel where independent)
#   Phase 4:  Cloud Run Jobs (autonomous-engine, shadow-learner)
#   Phase 5:  Cloud Scheduler — 4 jobs (pipeline-sweep, ai-reflection, ontology-decay, inbound-radar)
#   Phase 6:  Firebase (starts immediately after gate-passed)
#
# Key production rules applied:
#   - $$VAR   = bash variable (Cloud Build escapes → bash sees $VAR)
#   - $VAR    = Cloud Build built-in substitution ($PROJECT_ID, $COMMIT_SHA)
#   - --update-env-vars on Cloud Run SERVICES (never wipe console-set secrets)
#   - --set-env-vars  on Cloud Run JOBS (jobs have no console-set secrets)
#   - set -eo pipefail on every bash step (fail fast, no silent errors)
#   - Pinned cloud-sdk:slim (stable, ~400MB lighter than full image)
#   - Docker images tagged :$COMMIT_SHA AND :latest (enables rollback)
#   - --platform=managed (non-interactive, no gcloud prompts in CI)
#   - --task-timeout=3600s (the 's' suffix is required by the Cloud Run Jobs API)
#   - --quiet on all gcloud write commands (suppress confirmation prompts)
#   - secure-key.json deleted after firebase deploy (security hygiene)
# =============================================================================

timeout: '3600s'

steps:

# =============================================================================
# PHASE 0: FRONTEND QA GATE (2-layer)
# Layer 1 — node --check: catches SyntaxErrors (missing catch, unexpected token)
# Layer 2 — node -e scan: catches missing function declarations (ReferenceErrors
#            that only surface at runtime and lock out the entire app).
# Both layers must pass before any Docker build or Firebase deploy starts.
# Total cost: ~3s. Zero broken deployments possible.
# =============================================================================

- id: 'syntax-check-appjs'
  waitFor: ['-']
  name: 'node:20-slim'
  entrypoint: bash
  args:
  - '-c'
  - |
    set -eo pipefail
    echo "[GATE L1] Checking JS syntax: public/app.js"
    node --check public/app.js
    echo "[GATE L1] Syntax OK."

    echo "[GATE L2] Checking critical function declarations..."
    node -e "
      const fs = require('fs');
      const code = fs.readFileSync('public/app.js', 'utf8');
      const required = [
        'function loadLeads',
        'function loadMe',
        'function loadCampaigns',
        'function renderLeads',
        'window.showToast',
        'window.createLeadCardV2',
        'window.copilotAction',
        'virtualObserver',
        'window.switchTab',
        'window.viewLeadTimeline'
      ];
      let failed = false;
      required.forEach(fn => {
        if (!code.includes(fn)) {
          console.error('[GATE L2] MISSING FUNCTION: ' + fn);
          failed = true;
        } else {
          console.log('[GATE L2] OK: ' + fn);
        }
      });
      if (failed) process.exit(1);
      console.log('[GATE L2] All critical declarations present.');
    "
    echo "[GATE] All JS checks passed — proceeding."

# =============================================================================
# PHASE 0b: PYTHON V23 SMOKE TEST GATE
# Runs the local_smoke_tests.py suite (50 tests) against the V23 module tree.
# Blocks ALL Docker builds if any test fails — zero broken images possible.
# Cost: ~5s on E2_HIGHCPU_8. Runs in parallel with syntax-check-appjs.
# =============================================================================

- id: 'python-v23-smoke-gate'
  waitFor: ['-']
  name: 'python:3.11-slim'
  entrypoint: bash
  args:
  - '-c'
  - |
    set -eo pipefail
    echo "[GATE PY] Installing test dependencies..."
    pip install --no-cache-dir --prefer-binary \
      cryptography flask flask-cors \
      google-auth requests \
      httpx beautifulsoup4 \
      google-cloud-firestore google-cloud-storage==2.19.0 google-cloud-secret-manager \
      tenacity \
      --quiet

    # Generate a fresh, disposable Fernet key ONLY for the smoke-test run.
    # This is NOT the production key. The real key lives in Secret Manager
    # and is injected by Cloud Run --update-env-vars at deploy time.
    # We only need a valid key shape here to test that the Fernet cipher
    # initialises and round-trips correctly.
    SMOKE_KEY=$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
    export ENCRYPTION_KEY="$$SMOKE_KEY"
    echo "[GATE PY] Disposable smoke-test Fernet key generated."

    export PROJECT_ID="$PROJECT_ID"
    export LOCATION="asia-south1"
    export PYTHONIOENCODING=utf-8
    echo "[GATE PY] Running V23 local smoke tests (69 cases) + V23.5 radar tests (57 cases)..."
    cd services/orchestrator
    python local_smoke_tests.py
    python test_v23_5_inbound_radar.py
    echo "[GATE PY] All 126 smoke tests PASSED (69 V23.4 + 57 V23.5). Build proceeding."

# Barrier step: both gates must pass before any Docker build starts
- id: 'gate-passed'
  waitFor: ['syntax-check-appjs', 'python-v23-smoke-gate']
  name: 'alpine'
  entrypoint: echo
  args: ['[BARRIER] Both QA gates passed. Initiating parallel Docker builds.']

# =============================================================================
# NOTE: BigQuery IAM grants for lead-pipeline-sa
# The Cloud Build SA lacks resourcemanager.projects.setIamPolicy so IAM
# grants cannot be run inside Cloud Build steps.
#
# Run these TWO commands ONE TIME manually from a terminal with Owner/IAM
# Admin rights BEFORE the first Serper telemetry write:
#
#   # 1. Job execution rights (already granted — kept for reference)
#   gcloud projects add-iam-policy-binding lead-sniper-prod \
#     --member="serviceAccount:lead-pipeline-sa@lead-sniper-prod.iam.gserviceaccount.com" \
#     --role="roles/bigquery.jobUser" \
#     --condition=None
#
#   # 2. Stream-insert rights on swarm_analytics dataset (V23.4.1 — NEW)
#   #    Required for: insert_rows_json() into serper_audit_logs,
#   #                  rlhf_events, and Negative_Signals tables.
#   #    Without this, BQ returns PERMISSION_DENIED even with a valid OIDC token.
#   gcloud projects add-iam-policy-binding lead-sniper-prod \
#     --member="serviceAccount:lead-pipeline-sa@lead-sniper-prod.iam.gserviceaccount.com" \
#     --role="roles/bigquery.dataEditor" \
#     --condition=None
#
# Until then the geo heatmap uses Firestore as its data source (always works).
# =============================================================================

